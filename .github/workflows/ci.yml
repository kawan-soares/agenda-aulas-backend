name: CI - Backend

# Roda automaticamente sempre que alguém dá push ou abre um pull request pra main.
# É esse arquivo que faz aparecer a aba "Actions" rodando os testes sozinha.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: agenda-aulas/pom.xml

      - name: Rodar os testes (JUnit + Mockito)
        run: cd agenda-aulas && mvn -B test